name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test manager
        working-directory: services/manager
        run: go test -race ./...

      - name: Test gateway
        working-directory: services/gateway
        run: go test -race ./...

      - name: Vet manager
        working-directory: services/manager
        run: go vet ./...

      - name: Vet gateway
        working-directory: services/gateway
        run: go vet ./...

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/p2pool-dashboard
            bash infra/scripts/deploy.sh --branch ${{ github.event.inputs.branch || 'main' }}
