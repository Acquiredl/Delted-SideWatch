services:
  manager:
    build:
      context: .
      dockerfile: infra/docker/manager/Dockerfile
    ports:
      - "8081:8081"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    secrets:
      - postgres_password
      - jwt_secret
    networks:
      - backend

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - manager
    env_file: .env
    restart: unless-stopped
    secrets:
      - jwt_secret
    networks:
      - backend

  postgres:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/scripts/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
    environment:
      POSTGRES_DB: p2pool_dashboard
      POSTGRES_USER: manager_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manager_user -d p2pool_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3001:3000"
    environment:
      API_PROXY_URL: http://gateway:8080
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gateway
      - frontend
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
    depends_on:
      - alertmanager
    restart: unless-stopped
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password
    restart: unless-stopped
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/config.yml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - backend

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/loki/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - backend

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  jwt_secret:
    file: ./secrets/jwt_secret
  grafana_admin_password:
    file: ./secrets/grafana_admin_password

volumes:
  pgdata:
  redisdata:
  grafanadata:

networks:
  backend:
    driver: bridge
