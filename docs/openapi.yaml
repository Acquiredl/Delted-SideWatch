openapi: 3.0.3
info:
  title: SideWatch API
  description: |
    REST API for SideWatch, a P2Pool Monero mining observability dashboard.
    Provides pool statistics, miner lookups, block history, sidechain data,
    subscription management, community funding, and shared node status.

    **Base URL**: Served by the manager service (default port 8081) behind the
    gateway (default port 8080). In production, nginx proxies everything on 443.

    **Authentication**: Most endpoints are public. Admin endpoints require an
    `X-Admin-Token` header. The tax export and worker breakdown endpoints
    require a paid subscription with API key ownership proof.
  version: 1.1.0
  license:
    name: AGPL-3.0

servers:
  - url: http://localhost:8080
    description: Local development (via gateway)
  - url: http://localhost:8081
    description: Direct manager access

tags:
  - name: Pool
    description: Aggregate pool statistics
  - name: Miner
    description: Per-miner statistics and payment history
  - name: Blocks
    description: Found blocks on the Monero main chain
  - name: Sidechain
    description: P2Pool sidechain share data and stats timeseries
  - name: Workers
    description: Local stratum worker data
  - name: Subscription
    description: XMR subscription management and payment verification
  - name: Fund
    description: Community crowdfund for shared infrastructure
  - name: Nodes
    description: Shared P2Pool node pool status and connection info
  - name: Admin
    description: Admin-only endpoints (require X-Admin-Token)
  - name: System
    description: Health checks and operational endpoints

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns service health including Postgres, Redis, and P2Pool API connectivity.
      responses:
        "200":
          description: All systems healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: One or more dependencies degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/pool/stats:
    get:
      tags: [Pool]
      summary: Pool overview statistics
      description: |
        Returns aggregate pool stats including total hashrate, miner count,
        blocks found, and total XMR paid. Cached for 15 seconds.
      responses:
        "200":
          description: Pool statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"

  /api/miner/{address}:
    get:
      tags: [Miner]
      summary: Miner statistics
      description: Returns current hashrate, 24h average, total shares, and total paid for a miner.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Miner statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinerStats"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/payments:
    get:
      tags: [Miner]
      summary: Miner payment history
      description: |
        Returns paginated coinbase payments for a miner. Includes fiat prices
        (XMR/USD, XMR/CAD) when available. Free tier payment count is capped.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinerPayment"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/payment-summary:
    get:
      tags: [Miner]
      summary: Per-year payment totals
      description: Returns aggregated payment totals grouped by calendar year for a miner.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Yearly payment summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentYearSummary"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/hashrate:
    get:
      tags: [Miner]
      summary: Miner hashrate timeseries
      description: |
        Returns 15-minute bucketed hashrate data points for a miner.
        Free tier is limited to 30 days of history.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
        - name: hours
          in: query
          description: Number of hours of history to return (default 24)
          schema:
            type: integer
            default: 24
            minimum: 1
      responses:
        "200":
          description: Hashrate timeseries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HashratePoint"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/uncle-rate:
    get:
      tags: [Miner]
      summary: Miner uncle rate timeseries
      description: |
        Returns uncle rate data points for a miner, bucketed over time.
        Maximum 720 hours (30 days).
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
        - name: hours
          in: query
          description: Number of hours of history (default 24, max 720)
          schema:
            type: integer
            default: 24
            maximum: 720
            minimum: 1
      responses:
        "200":
          description: Uncle rate timeseries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UncleRatePoint"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/workers:
    get:
      tags: [Miner]
      summary: Per-worker share breakdown (paid tier)
      description: |
        Returns share counts per worker name for a miner.
        **Requires Supporter+ subscription.**
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Worker breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinerWorker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Supporter+ subscription required

  /api/miner/{address}/tax-export:
    get:
      tags: [Miner]
      summary: Tax export (CSV)
      description: |
        Downloads all payments as a CSV file with columns: date, amount_atomic,
        amount_xmr, xmr_usd_price, xmr_cad_price, usd_value, cad_value.
        Includes a TOTAL row at the end. Supports `?year=YYYY` filter.
        **Requires API key ownership.** Lapsed subscribers can still export
        held-back year data (decrements export counter).
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
        - name: year
          in: query
          description: Filter to a specific calendar year
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Active subscription or held-back export required

  /api/miner/{address}/held-data:
    get:
      tags: [Miner]
      summary: Held-back data status
      description: |
        Returns whether a lapsed miner has previous-year data held back
        for tax export, and how many exports remain.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Held data status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldDataStatus"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/miner/{address}/data:
    delete:
      tags: [Miner]
      summary: Delete all miner data
      description: |
        Permanently deletes ALL data for a miner across all tables (shares,
        hashrate, payments, subscription payments). Resets subscription to free.
        **Requires API key ownership** and a confirmation string in the request body.
        This action is irreversible.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  description: Must be exactly "DELETE ALL MY DATA"
                  example: "DELETE ALL MY DATA"
      responses:
        "200":
          description: Data deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: API key ownership required

  /api/miners/weekly:
    get:
      tags: [Pool]
      summary: Weekly active miners
      description: Returns miners that submitted at least one share in the last 7 days.
      responses:
        "200":
          description: Weekly miner list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyMiner"

  /api/blocks:
    get:
      tags: [Blocks]
      summary: Found blocks
      description: Returns paginated list of Monero main chain blocks found by P2Pool miners.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Block list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoundBlock"

  /api/sidechain/shares:
    get:
      tags: [Sidechain]
      summary: Recent sidechain shares
      description: Returns paginated list of recent shares submitted to the P2Pool sidechain.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Share list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SidechainShare"

  /api/sidechain/stats:
    get:
      tags: [Sidechain]
      summary: Pool stats timeseries
      description: |
        Returns pool hashrate, miner count, sidechain height, and difficulty
        over time. Snapshots are taken every 30 seconds from the P2Pool data-api.
      parameters:
        - name: hours
          in: query
          description: Number of hours of history (default 24, max 168)
          schema:
            type: integer
            default: 24
            maximum: 168
            minimum: 1
      responses:
        "200":
          description: Pool stats timeseries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoolStatsPoint"

  /api/workers:
    get:
      tags: [Workers]
      summary: Local stratum workers
      description: Returns miners currently connected to the local P2Pool stratum with their recent hashrate.
      responses:
        "200":
          description: Worker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocalWorker"

  /api/subscription/status/{address}:
    get:
      tags: [Subscription]
      summary: Subscription status
      description: Returns the subscription tier, active status, and expiry for a miner.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/subscription/address/{address}:
    get:
      tags: [Subscription]
      summary: Payment address
      description: |
        Returns (or assigns) a unique wallet subaddress for the miner to send
        subscription payments to. Includes suggested XMR amount based on current price.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: Payment address details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentAddress"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Payment address generation not configured

  /api/subscription/payments/{address}:
    get:
      tags: [Subscription]
      summary: Subscription payment history
      description: Returns paginated list of on-chain subscription payments detected for a miner.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Subscription payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubPayment"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/subscription/api-key/{address}:
    post:
      tags: [Subscription]
      summary: Generate API key
      description: |
        Generates a new API key for programmatic access. Requires an active paid
        subscription. The key is returned once and cannot be retrieved again.
        Generating a new key replaces any existing key.
      parameters:
        - $ref: "#/components/parameters/MinerAddress"
      responses:
        "200":
          description: API key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                    example: "sk_live_abc123..."
                  note:
                    type: string
                    example: "Store this key securely. It cannot be retrieved again."
        "403":
          description: Active paid subscription required

  /api/fund/status:
    get:
      tags: [Fund]
      summary: Current month funding status
      description: Returns the current month's crowdfund progress including goal, amount funded, and node summary.
      responses:
        "200":
          description: Fund status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundStatus"

  /api/fund/history:
    get:
      tags: [Fund]
      summary: Monthly funding history
      description: Returns historical monthly funding data for charts.
      responses:
        "200":
          description: Monthly funding records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FundMonth"

  /api/fund/supporters:
    get:
      tags: [Fund]
      summary: Current month supporters
      description: Returns the opt-in list of contributors for the current month. Addresses are truncated for privacy.
      responses:
        "200":
          description: Supporter list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supporter"

  /api/nodes/status:
    get:
      tags: [Nodes]
      summary: Shared node health
      description: Returns health status of all shared P2Pool nodes in the pool.
      responses:
        "200":
          description: Node status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeStatusResponse"

  /api/nodes/connection-info:
    get:
      tags: [Nodes]
      summary: Node connection info
      description: Returns stratum URLs and XMRig configuration snippets for all available shared nodes.
      responses:
        "200":
          description: Connection info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionInfoResponse"

  /api/admin/backfill-prices:
    post:
      tags: [Admin]
      summary: Backfill historical prices
      description: |
        Fills in missing XMR/USD and XMR/CAD prices for historical payments by
        querying CoinGecko. Payments are grouped by date to minimize API calls.
      security:
        - AdminToken: []
      responses:
        "200":
          description: Backfill result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillResult"
        "403":
          description: Invalid or missing admin token

  /api/admin/backfill-sub-prices:
    post:
      tags: [Admin]
      summary: Backfill subscription payment prices
      description: |
        Fills in missing XMR/CAD (and XMR/USD) prices for historical subscription
        payments using CoinGecko historical price data.
      security:
        - AdminToken: []
      responses:
        "200":
          description: Backfill result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillResult"
        "403":
          description: Invalid or missing admin token

  /api/admin/subscription-income:
    get:
      tags: [Admin]
      summary: Subscription income report
      description: |
        Returns all confirmed subscription payments for admin tax reporting.
        Supports `?year=YYYY` to filter by year and `?format=csv` for CSV export
        (includes TOTAL row).
      security:
        - AdminToken: []
      parameters:
        - name: year
          in: query
          description: Filter to a specific calendar year
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: format
          in: query
          description: Response format (default JSON, set to "csv" for CSV download)
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Subscription payments (JSON or CSV)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubPayment"
            text/csv:
              schema:
                type: string
                format: binary
        "403":
          description: Invalid or missing admin token

  /api/admin/subscription-stats:
    get:
      tags: [Admin]
      summary: Aggregate subscription statistics
      description: Returns counts of total, active, lapsed, held-back, and nuked subscribers.
      security:
        - AdminToken: []
      responses:
        "200":
          description: Subscription stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStats"
        "403":
          description: Invalid or missing admin token

  /api/webhook/alerts:
    post:
      tags: [Admin]
      summary: Alertmanager webhook
      description: |
        Receives alert notifications from Prometheus Alertmanager. Logs alerts
        and increments Prometheus counters. Accepts both `X-Admin-Token` header
        and `Authorization: Bearer` token.
      security:
        - AdminToken: []
        - BearerAuth: []
      responses:
        "200":
          description: Alerts received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
        "403":
          description: Invalid or missing admin token

  /ws/pool/stats:
    get:
      tags: [Pool]
      summary: Live pool stats (WebSocket)
      description: |
        WebSocket endpoint that pushes PoolStats objects whenever new data is
        available. Falls back to the REST endpoint with polling if WebSocket
        is unavailable.

        **Protocol**: Standard WebSocket upgrade. No authentication required.
        Server sends JSON messages matching the PoolStats schema.
      responses:
        "101":
          description: WebSocket upgrade

components:
  parameters:
    MinerAddress:
      name: address
      in: path
      required: true
      description: Monero wallet address (up to 256 characters)
      schema:
        type: string
        maxLength: 256
        example: "47PoGvdcgHhUn59gTNJbL8JSSZVEHVVeDPgMZ4DJqZzZCLfja5gciS7CMkMdXhywGXhBsHCSR99N4BCiVc3fqQvDGfvxBY5"

    Limit:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        maximum: 200
        minimum: 1

    Offset:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        default: 0
        minimum: 0

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        postgres:
          type: string
        redis:
          type: string
        p2pool:
          type: string

    PoolStats:
      type: object
      properties:
        total_miners:
          type: integer
        total_hashrate:
          type: integer
          format: int64
          description: Total pool hashrate in H/s
        blocks_found:
          type: integer
        last_block_found_at:
          type: string
          format: date-time
          nullable: true
        total_paid:
          type: integer
          format: int64
          description: Total XMR paid in atomic units (1 XMR = 1e12)
        sidechain:
          type: string
          enum: [mini, main]

    MinerStats:
      type: object
      properties:
        address:
          type: string
        current_hashrate:
          type: integer
          format: int64
        average_hashrate:
          type: integer
          format: int64
          description: 24-hour average hashrate in H/s
        total_shares:
          type: integer
        total_paid:
          type: integer
          format: int64
          description: Atomic units
        last_share_at:
          type: string
          format: date-time
          nullable: true
        last_payment_at:
          type: string
          format: date-time
          nullable: true

    MinerPayment:
      type: object
      properties:
        amount:
          type: integer
          format: int64
          description: Payment amount in atomic units
        main_height:
          type: integer
          format: int64
        xmr_usd_price:
          type: number
          format: double
          nullable: true
        xmr_cad_price:
          type: number
          format: double
          nullable: true
        paid_at:
          type: string
          format: date-time

    PaymentYearSummary:
      type: object
      properties:
        year:
          type: integer
        payment_count:
          type: integer
        total_atomic:
          type: integer
          format: uint64
          description: Total paid in atomic units for the year
        total_cad:
          type: number
          format: double
          nullable: true
        total_usd:
          type: number
          format: double
          nullable: true

    HashratePoint:
      type: object
      properties:
        hashrate:
          type: integer
          format: int64
        bucket_time:
          type: string
          format: date-time

    UncleRatePoint:
      type: object
      properties:
        uncle_rate:
          type: number
          format: double
          description: Fraction of shares that are uncles (0.0-1.0)
        total_shares:
          type: integer
        uncle_shares:
          type: integer
        bucket_time:
          type: string
          format: date-time

    MinerWorker:
      type: object
      properties:
        worker_name:
          type: string
        shares:
          type: integer
        last_share_at:
          type: string
          format: date-time

    HeldDataStatus:
      type: object
      properties:
        has_held_data:
          type: boolean
        held_year:
          type: integer
          description: Calendar year of the held-back data
        exports_remaining:
          type: integer
          description: Number of tax exports still available

    WeeklyMiner:
      type: object
      properties:
        address:
          type: string
        share_count:
          type: integer
        last_share_at:
          type: string
          format: date-time

    FoundBlock:
      type: object
      properties:
        main_height:
          type: integer
          format: int64
        main_hash:
          type: string
        sidechain_height:
          type: integer
          format: int64
        coinbase_reward:
          type: integer
          format: int64
          description: Block reward in atomic units
        effort:
          type: number
          format: double
          nullable: true
          description: Mining effort (1.0 = 100%)
        found_at:
          type: string
          format: date-time

    SidechainShare:
      type: object
      properties:
        miner_address:
          type: string
        worker_name:
          type: string
          nullable: true
        sidechain:
          type: string
        sidechain_height:
          type: integer
          format: int64
        difficulty:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    PoolStatsPoint:
      type: object
      properties:
        pool_hashrate:
          type: integer
          format: uint64
        pool_miners:
          type: integer
        sidechain_height:
          type: integer
          format: uint64
        sidechain_difficulty:
          type: integer
          format: uint64
        created_at:
          type: string
          format: date-time

    LocalWorker:
      type: object
      properties:
        miner_address:
          type: string
        current_hashrate:
          type: integer
          format: uint64
          description: Current hashrate in H/s
        last_seen:
          type: string
          format: date-time

    SubscriptionStatus:
      type: object
      properties:
        miner_address:
          type: string
        tier:
          type: string
          enum: [free, paid]
        active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        grace_until:
          type: string
          format: date-time
          nullable: true
        has_api_key:
          type: boolean

    PaymentAddress:
      type: object
      properties:
        miner_address:
          type: string
        subaddress:
          type: string
          description: Unique wallet subaddress for this miner's payments
        suggested_amount_xmr:
          type: string
          description: Suggested XMR amount based on current price
        amount_usd:
          type: string
          description: Target USD amount

    SubPayment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        miner_address:
          type: string
        tx_hash:
          type: string
        amount:
          type: integer
          format: int64
          description: Atomic units
        xmr_usd_price:
          type: number
          format: double
          nullable: true
        xmr_cad_price:
          type: number
          format: double
          nullable: true
        confirmed:
          type: boolean
        main_height:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time

    FundStatus:
      type: object
      properties:
        month:
          type: string
          description: "Month in YYYY-MM format"
          example: "2026-04"
        goal_usd:
          type: number
          format: double
        funded_usd:
          type: number
          format: double
        percent_funded:
          type: integer
          description: Percentage of goal funded (0-100+)
        infra_cost_usd:
          type: number
          format: double
        supporter_count:
          type: integer
        node_count:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FundNode"

    FundNode:
      type: object
      properties:
        name:
          type: string
        sidechain:
          type: string
        status:
          type: string
        miners:
          type: integer
          nullable: true

    FundMonth:
      type: object
      properties:
        month:
          type: string
          example: "2026-03"
        goal_usd:
          type: number
          format: double
        funded_usd:
          type: number
          format: double
        supporter_count:
          type: integer

    Supporter:
      type: object
      properties:
        address:
          type: string
          description: Truncated wallet address (first 4 + last 4 chars)
        tier:
          type: string
        since:
          type: string
          format: date-time

    NodeStatusResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeSummary"

    NodeSummary:
      type: object
      properties:
        name:
          type: string
        sidechain:
          type: string
        status:
          type: string
          description: "Health status (healthy, degraded, down, unknown)"
        miners:
          type: integer
          nullable: true
        hashrate:
          type: integer
          format: int64
          nullable: true
        peers:
          type: integer
          nullable: true
        last_health_at:
          type: string
          format: date-time
          nullable: true

    ConnectionInfoResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeConnectionInfo"
        onion_url:
          type: string
          description: Tor hidden service URL (if available)

    NodeConnectionInfo:
      type: object
      properties:
        name:
          type: string
        sidechain:
          type: string
        status:
          type: string
        stratum_url:
          type: string
          description: "Stratum URL for XMRig (e.g. stratum+tcp://host:3333)"
        xmrig_config:
          $ref: "#/components/schemas/XMRigConfig"

    XMRigConfig:
      type: object
      description: Minimal XMRig pool configuration block
      properties:
        url:
          type: string
          example: "stratum+tcp://p2pool.sidewatch.org:3333"
        user:
          type: string
          example: "YOUR_WALLET_ADDRESS"
        pass:
          type: string
          example: "x"

    BackfillResult:
      type: object
      properties:
        updated:
          type: integer
        skipped:
          type: integer
        duration:
          type: string
          example: "2.5s"

    SubscriptionStats:
      type: object
      properties:
        total_miners:
          type: integer
        active_supporter:
          type: integer
        active_champion:
          type: integer
        lapsed:
          type: integer
        held_back_exports:
          type: integer
        nuked_miners:
          type: integer
