global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts get shorter repeat interval
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      # Internal webhook to manager (always active)
      - url: 'http://manager:8081/api/webhook/alerts'
        send_resolved: true

      # Discord webhook (uncomment and set URL)
      # - url: 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN'
      #   send_resolved: true

  # Email alerts (uncomment and configure SMTP)
  # - name: email
  #   email_configs:
  #     - to: 'admin@example.com'
  #       from: 'alertmanager@example.com'
  #       smarthost: 'smtp.example.com:587'
  #       auth_username: 'alertmanager@example.com'
  #       auth_password: '<app-password>'
  #       require_tls: true
