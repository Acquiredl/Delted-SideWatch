worker_processes 1;
events { worker_connections 128; }

http {
    default_type application/json;
    sendfile off;  # prevent stale kernel cache on tmpfs volumes

    server {
        listen 8080;
        server_name _;

        # Serve P2Pool data-api JSON files.
        # Maps: GET /pool/stats    -> /data/pool/stats
        #       GET /network/stats -> /data/network/stats
        #       GET /local/stratum -> /data/local/stratum
        #       GET /local/p2p     -> /data/local/p2p
        #       GET /stats_mod     -> /data/stats_mod
        location / {
            alias /data/;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }

        location = /health {
            return 200 '{"status":"ok"}';
        }
    }
}
