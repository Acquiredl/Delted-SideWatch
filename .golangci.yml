version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gosec
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G104
        - G304
        - G706
    gocritic:
      enabled-checks: []
      enabled-tags:
        - diagnostic
        - style
      disabled-tags:
        - opinionated

formatters:
  enable:
    - gofmt
